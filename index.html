<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing PRO Boat</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#06101c;
  color:white;
  padding:16px;
}
.card{
  background:#0f2236;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00c2ff;
  font-weight:bold;
}
.item{
  background:rgba(255,255,255,0.06);
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
.good{color:#35d07f}
.warn{color:#f1c40f}
.bad{color:#ff6666}
</style>
</head>

<body>

<h2>🎣 Fishing PRO Boat</h2>

<div class="card">
  <h3>Weather</h3>
  <button onclick="loadWeather()">Load Weather</button>
  <div id="weatherBox">Tap button</div>
</div>

<div class="card">
  <h3>Legal + Catch</h3>

  <select id="fish"></select>
  <input id="size" placeholder="Size cm">

  <button onclick="check()">Check Legal</button>
  <div id="legalBox"></div>

  <hr>

  <input id="count" value="1">
  <input id="notes" placeholder="Notes">

  <button onclick="save()">Save Catch</button>
  <div id="log"></div>
</div>

<script>

// ===== DATA =====
const fishDB = [
 {name:'Kob',min:60,bag:5},
 {name:'Geelbek',min:60,bag:2},
 {name:'Dageraad',min:40,bag:1},
 {name:'Shad',min:30,bag:4}
];

// ===== INIT =====
function fill(){
  fish.innerHTML = fishDB.map(f=>`<option>${f.name}</option>`).join('');
}
fill();

// ===== WEATHER =====
function baro(p){
  if(p>=1018) return 'High';
  if(p>=1010) return 'Good';
  if(p>=1003) return 'Falling';
  return 'Low';
}

async function loadWeather(){
  weatherBox.innerHTML='Loading...';

  try{
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=-34.37&longitude=21.42&daily=temperature_2m_max,temperature_2m_min,wind_speed_10m_max,pressure_msl_mean&timezone=auto");
    const d = await res.json();

    weatherBox.innerHTML = d.daily.time.slice(0,3).map((day,i)=>`
      <div class="item">
        <b>${day}</b><br>
        Day: ${d.daily.temperature_2m_max[i]}°C<br>
        Night: ${d.daily.temperature_2m_min[i]}°C<br>
        Wind: ${d.daily.wind_speed_10m_max[i]} km/h<br>
        Baro: ${d.daily.pressure_msl_mean[i]}<br>
        Grade: ${baro(d.daily.pressure_msl_mean[i])}
      </div>
    `).join('');

  }catch{
    weatherBox.innerHTML=`
      <div class="item warn">
        API fail – fallback<br><br>
        Day: 20°C<br>
        Night: 14°C<br>
        Wind: 12 km/h<br>
        Grade: Good
      </div>
    `;
  }
}

// ===== STORAGE =====
function getLogs(){
  return JSON.parse(localStorage.getItem("logs")||"[]");
}
function setLogs(v){
  localStorage.setItem("logs",JSON.stringify(v));
}

// ===== LEGAL =====
function check(){
  const f = fishDB.find(x=>x.name===fish.value);
  const sizeVal = Number(size.value);

  let caught=0;
  getLogs().forEach(l=>{
    if(l.fish===f.name && l.day===new Date().toDateString()){
      caught+=l.count;
    }
  });

  let left = f.bag - caught;
  let txt='';
  let cls='good';

  if(sizeVal && sizeVal<f.min){
    txt+='❌ Too small<br>';
    cls='bad';
  }else{
    txt+='✅ Size OK<br>';
  }

  txt+=`Bag: ${f.bag}<br>`;
  txt+=`Caught: ${caught}<br>`;
  txt+=`Left: ${left<0?0:left}<br>`;

  if(caught>f.bag){
    txt+='🚨 OVER LIMIT';
    cls='bad';
  }

  legalBox.innerHTML=`<div class="${cls}">${txt}</div>`;
}

// ===== SAVE =====
function save(){
  const f = fish.value;
  const c = Number(count.value||1);

  const logs = getLogs();
  logs.unshift({
    fish:f,
    count:c,
    day:new Date().toDateString()
  });

  setLogs(logs);
  render();
  check();
}

// ===== RENDER =====
function render(){
  log.innerHTML = getLogs().map(l=>`
    <div class="item">
      ${l.fish} (${l.count})
    </div>
  `).join('');
}
render();

</script>

</body>
</html>
