<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing App V13</title>

<meta http-equiv="Cache-Control" content="no-store">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<div class="app">

<header>
<h2>🎣 Fishing App V13</h2>
</header>

<nav>
<button onclick="tab('home')">Home</button>
<button onclick="tab('fish')">Fish</button>
<button onclick="tab('map')">Map</button>
</nav>

<!-- HOME -->
<section id="home" class="tab active">
<div class="card">
<h3>Weather</h3>
<p id="weather"></p>
</div>

<div class="card">
<h3>Week Temps</h3>
<div id="temps"></div>
</div>

<div class="card">
<h3>Tides</h3>
<div id="tides"></div>
</div>
</section>

<!-- FISH -->
<section id="fish" class="tab">
<div id="fishList"></div>
<div id="fishDetail"></div>
</section>

<!-- MAP -->
<section id="map" class="tab">
<div id="mapView"></div>

<button onclick="getGPS()">Use GPS</button>
<button onclick="saveSpot()">Save Spot</button>

<div id="gps"></div>
<div id="spots"></div>
</section>

</div>

<script src="app.js"></script>
</body>
</html>
