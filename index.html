<!DOCTYPE html>
<html lang="af">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stilbaai Fishing App V12</title>

  <!-- NO CACHE -->
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta http-equiv="Pragma" content="no-cache" />

  <link rel="stylesheet" href="style.css" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div class="app-shell">

<header class="topbar">
  <h1>🎣 Fishing App</h1>
  <div class="badge">V12</div>
</header>

<nav class="tabbar">
  <button onclick="showTab('home')">Home</button>
  <button onclick="showTab('fish')">Fish</button>
  <button onclick="showTab('map')">Map</button>
</nav>

<!-- HOME -->
<section id="home" class="tab active">
  <div class="card">
    <h3>Weather</h3>
    <p id="weatherBox">Loading...</p>
  </div>

  <div class="card">
    <h3>Week Temps</h3>
    <div id="weekTemps"></div>
  </div>

  <div class="card">
    <h3>Tides</h3>
    <div id="tides"></div>
  </div>
</section>

<!-- FISH -->
<section id="fish" class="tab">
  <div id="fishIndex" class="grid"></div>
  <div id="fishDetail" class="card"></div>
</section>

<!-- MAP -->
<section id="map" class="tab">
  <div id="mapView"></div>

  <button onclick="useGPS()">Use My GPS</button>
  <button onclick="saveSpot()">Save Spot</button>

  <div id="gpsStatus"></div>
  <div id="spotList"></div>
</section>

</div>

<script src="app.js"></script>
</body>
</html>
